<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');

/* ── Reset ── */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Variables — matches Depth Chart Auditor ── */
:root {
  --bg: #080c12; --bg2: #0d1117; --bg3: #111827; --bg4: #0f172a;
  --bdr: #1e293b; --bdr2: #1e2740;
  --t1: #f1f5f9; --t2: #e2e8f0; --t3: #94a3b8; --t4: #64748b; --t5: #475569;
  --blue: #2563eb; --blued: #1d4ed8; --bluebg: #172554; --bluel: #60a5fa; --bluell: #93c5fd;
  --grn: #059669; --grnd: #047857; --grnbg: #052e16; --grnl: #34d399; --grnll: #6ee7b7;
  --red: #dc2626; --redbg: #450a0a; --redl: #f87171;
  --org: #d97706; --orgbg: #451a03; --orgl: #fbbf24;
  --purp: #7c3aed; --purpbg: #2e1065; --purpl: #a78bfa;
  --cyan: #0891b2; --cyanbg: #083344; --cyanl: #22d3ee;
  --starter: #38bdf8; --starterbg: #0c4a6e;
}

body {
  min-height: 100vh; background: var(--bg);
  color: var(--t2); font-family: 'Söhne','Helvetica Neue',-apple-system,sans-serif;
  -webkit-tap-highlight-color: transparent;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
::selection { background: #2563eb40; color: #fff; }

/* ── Animations ── */
@keyframes fi { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.5 } }
@keyframes shimmer { 0% { background-position:-200% 0 } 100% { background-position:200% 0 } }
@keyframes glow { 0%,100% { box-shadow:0 0 4px rgba(56,189,248,.15) } 50% { box-shadow:0 0 12px rgba(56,189,248,.25) } }
@keyframes slideIn { from { opacity:0; transform:translateX(-8px) } to { opacity:1; transform:translateX(0) } }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
@keyframes livePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4) } 70% { box-shadow: 0 0 0 6px rgba(239,68,68,0) } }
@keyframes scanLine { 0% { top: 0 } 100% { top: 100% } }
.anim { animation: fi .3s ease; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #334155; }

/* ── Header ── */
.hdr {
  border-bottom: 1px solid #1a2030; padding: 10px 24px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg,#0f1520,var(--bg)); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
.hdr-logo {
  width: 32px; height: 32px; border-radius: 7px;
  background: linear-gradient(135deg, #ef4444, var(--org));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: #fff;
  box-shadow: 0 2px 8px rgba(239,68,68,.3);
}
.hdr-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.hdr-title { font-size: 14px; font-weight: 800; color: var(--t1); letter-spacing: -.2px; }
.hdr-sub { font-size: 10px; color: var(--t5); letter-spacing: .3px; }
.hdr-btns { display: flex; gap: 6px; align-items: center; }

/* ── Buttons ── */
.btn-sm {
  padding: 5px 12px; border-radius: 6px; border: 1px solid #334155;
  background: var(--bg3); color: var(--t3); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.btn-sm:hover { background: var(--bdr); color: var(--t2); border-color: #475569; }
.btn-save {
  padding: 5px 12px; border-radius: 6px; background: var(--bluebg);
  color: var(--bluel); border: 1px solid #1e40af; font-size: 11px;
  font-weight: 700; cursor: pointer; transition: all .15s;
}
.btn-save:hover { background: #1e3a5f; border-color: #3b82f6; }
.btn-pri {
  padding: 10px 20px; border-radius: 8px; border: none;
  background: linear-gradient(135deg,var(--blue),var(--blued));
  color: #fff; font-size: 13px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 20px #2563eb30; transition: all .2s;
}
.btn-pri:hover { box-shadow: 0 6px 28px #2563eb50; transform: translateY(-1px); }
.btn-pri:disabled { background: var(--bdr); color: var(--t5); cursor: not-allowed; box-shadow: none; transform: none; }
.btn-grn {
  padding: 10px 20px; border-radius: 8px; border: none;
  background: linear-gradient(135deg,var(--grn),var(--grnd));
  color: #fff; font-size: 13px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 20px #05966930; transition: all .2s;
}
.btn-grn:hover { box-shadow: 0 6px 28px #05966950; transform: translateY(-1px); }
.btn-red {
  padding: 10px 20px; border-radius: 8px; border: none;
  background: linear-gradient(135deg,var(--red),#b91c1c);
  color: #fff; font-size: 13px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 20px #dc262630; transition: all .2s;
}

/* ── Layout ── */
.wrap { max-width: 1400px; margin: 0 auto; padding: 20px; }
.h2 { font-size: 20px; font-weight: 800; color: var(--t1); margin-bottom: 6px; letter-spacing: -.5px; }
.sub { color: var(--t4); font-size: 13px; margin-bottom: 16px; }
.grid-main { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
@media (max-width: 900px) { .grid-main { grid-template-columns: 1fr; } }
@media (max-width: 600px) {
  .wrap { padding: 12px 8px; }
  .hdr { padding: 10px 12px; }
  .hdr-title { font-size: 13px; }
  .hdr-sub { font-size: 9px; }
  .lg-btn { padding: 6px 12px; font-size: 10px; }
  .btn-sm { padding: 6px 10px; font-size: 10px; }
  .btn-save { padding: 6px 10px; font-size: 10px; }
  .feed-filter { padding: 6px 12px; font-size: 11px; }
  .feed-btn { padding: 6px 12px; font-size: 11px; }
  .main-tabs { flex-wrap: wrap; width: 100%; }
  .main-tab { padding: 8px 12px; font-size: 11px; flex: 1; text-align: center; }
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
  .stat-val { font-size: 18px; }
  .h2 { font-size: 17px; }
  .panel-body { padding: 8px; }
  .feed-item { padding: 12px; }
  .config-input { font-size: 16px; } /* prevents iOS zoom on focus */
  select.config-input { font-size: 16px; }
  .ta { font-size: 16px; }
}

/* ── Panels ── */
.panel {
  background: var(--bg2); border: 1px solid var(--bdr); border-radius: 10px;
  overflow: hidden;
}
.panel-hdr {
  padding: 12px 16px; border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg4);
}
.panel-title { font-size: 12px; font-weight: 800; color: var(--t2); letter-spacing: .3px; text-transform: uppercase; }
.panel-body { padding: 12px; max-height: calc(100vh - 200px); overflow-y: auto; }
.panel-count {
  font-size: 10px; font-weight: 700; color: var(--t5);
  background: var(--bg3); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--bdr);
}

/* ── Source List (Left Panel) ── */
.src-search {
  padding: 8px; border-bottom: 1px solid var(--bdr);
}
.src-search input {
  width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg); color: var(--t2); font-size: 12px; outline: none;
}
.src-search input:focus { border-color: var(--blue); }
.src-tabs {
  display: flex; border-bottom: 1px solid var(--bdr); background: var(--bg4);
}
.src-tab {
  flex: 1; padding: 8px; text-align: center; font-size: 10px; font-weight: 700;
  color: var(--t5); cursor: pointer; transition: all .15s; border-bottom: 2px solid transparent;
}
.src-tab:hover { color: var(--t3); }
.src-tab.on { color: var(--bluel); border-bottom-color: var(--blue); }
.src-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-bottom: 1px solid #111827; cursor: pointer; transition: all .1s;
}
.src-item:hover { background: var(--bg3); }
.src-item.selected { background: var(--bluebg); border-left: 2px solid var(--blue); }
.src-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: var(--t4); flex-shrink: 0;
  border: 1px solid var(--bdr);
}
.src-info { flex: 1; min-width: 0; }
.src-handle { font-size: 11px; font-weight: 700; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.src-cat { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; white-space: nowrap; }
.cat-reporter { background: var(--bluebg); color: var(--bluel); }
.cat-team { background: var(--grnbg); color: var(--grnl); }
.cat-insider { background: var(--purpbg); color: var(--purpl); }
.cat-analyst { background: var(--orgbg); color: var(--orgl); }
.cat-league { background: var(--cyanbg); color: var(--cyanl); }
.cat-other { background: var(--bg3); color: var(--t4); }
.src-team { font-size: 9px; color: var(--t5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Feed Items ── */
.feed-controls {
  padding: 12px 16px; border-bottom: 1px solid var(--bdr);
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: var(--bg4);
}
.feed-filter {
  padding: 4px 10px; border-radius: 12px; border: 1px solid var(--bdr);
  background: var(--bg3); color: var(--t4); font-size: 10px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.feed-filter:hover { border-color: var(--t5); color: var(--t3); }
.feed-filter.on { border-color: var(--blue); color: var(--bluel); background: var(--bluebg); }

.feed-item {
  padding: 14px 16px; border-bottom: 1px solid #111827;
  animation: fadeUp .3s ease; transition: all .15s;
}
.feed-item:hover { background: #0d131f; }
.feed-item.approved { border-left: 3px solid var(--grn); }
.feed-item.rejected { border-left: 3px solid var(--red); opacity: .5; }
.feed-item.pending { border-left: 3px solid var(--org); }

.feed-meta {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.feed-author { font-size: 11px; font-weight: 800; color: var(--bluel); }
.feed-time { font-size: 10px; color: var(--t5); }
.feed-type {
  font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 8px;
  text-transform: uppercase; letter-spacing: .5px;
}
.type-injury { background: var(--redbg); color: var(--redl); }
.type-transaction { background: var(--purpbg); color: var(--purpl); }
.type-benching { background: var(--orgbg); color: var(--orgl); }
.type-promotion { background: var(--grnbg); color: var(--grnl); }
.type-suspension { background: #451a03; color: #fb923c; }
.type-return { background: var(--cyanbg); color: var(--cyanl); }
.type-unknown { background: var(--bg3); color: var(--t4); }
.type-portal { background: #1e1b4b; color: #818cf8; }
.type-nil { background: #172554; color: #60a5fa; }
.type-coaching { background: var(--cyanbg); color: var(--cyanl); }

/* ── League Switcher ── */
.league-sw{display:flex;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:2px;gap:2px;margin-right:6px}
.lg-btn{padding:5px 14px;border-radius:6px;border:none;background:none;color:var(--t5);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.lg-btn:hover{color:var(--t3)}
.lg-btn.on{color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.lg-btn.nfl.on{background:linear-gradient(135deg,#ef4444,var(--org))}
.lg-btn.ncaa.on{background:linear-gradient(135deg,var(--purp),#6d28d9)}
.cat-portal { background: #1e1b4b; color: #818cf8; }


.feed-text { font-size: 13px; color: var(--t2); line-height: 1.5; margin-bottom: 8px; }
.feed-text a { color: var(--bluel); text-decoration: none; }
.feed-text a:hover { text-decoration: underline; }

.feed-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.feed-tag {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
  background: var(--bg3); color: var(--t4); border: 1px solid var(--bdr);
}
.feed-tag.team { color: var(--bluel); border-color: #1e40af; }
.feed-tag.player { color: var(--grnl); border-color: #047857; }

.feed-actions {
  display: flex; gap: 6px; align-items: center;
}
.feed-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg3); color: var(--t4); font-size: 10px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.feed-btn:hover { border-color: var(--t5); color: var(--t3); }
.feed-btn.approve { border-color: #047857; color: var(--grnl); }
.feed-btn.approve:hover { background: var(--grnbg); }
.feed-btn.reject { border-color: #991b1b; color: var(--redl); }
.feed-btn.reject:hover { background: var(--redbg); }
.feed-btn.reclassify { border-color: #7c3aed40; color: var(--purpl); }

/* ── Stats Bar ── */
.stats-bar {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px; text-align: center;
}
.stat-val { font-size: 22px; font-weight: 800; color: var(--t1); font-family: 'JetBrains Mono', monospace; }
.stat-lbl { font-size: 10px; font-weight: 700; color: var(--t5); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* ── Import/Export ── */
.import-zone {
  border: 2px dashed var(--bdr); border-radius: 10px; padding: 24px;
  text-align: center; cursor: pointer; transition: all .2s;
}
.import-zone:hover { border-color: var(--blue); background: #0c1525; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
  background: var(--bg3); border: 1px solid var(--bdr); border-radius: 8px;
  color: var(--t2); font-size: 12px; font-weight: 700; z-index: 999;
  animation: fi .3s ease; box-shadow: 0 8px 32px rgba(0,0,0,.5);
}

/* ── Live indicator ── */
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
  animation: livePulse 1.5s infinite;
}
.live-badge {
  display: flex; align-items: center; gap: 6px; font-size: 10px;
  font-weight: 800; color: #ef4444; text-transform: uppercase; letter-spacing: .5px;
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg2); border: 1px solid var(--bdr); border-radius: 12px;
  max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
  animation: fi .2s ease;
}
.modal-hdr {
  padding: 16px 20px; border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-body { padding: 20px; }
.modal-close {
  background: none; border: none; color: var(--t5); font-size: 18px; cursor: pointer;
}
.modal-close:hover { color: var(--t2); }

/* ── Scrape Config ── */
.config-row {
  display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
}
.config-label { font-size: 11px; font-weight: 700; color: var(--t3); min-width: 100px; }
.config-input {
  flex: 1; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg); color: var(--t2); font-size: 12px; outline: none;
}
.config-input:focus { border-color: var(--blue); }
select.config-input { cursor: pointer; }

/* ── Team Grid ── */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
.team-chip {
  padding: 6px 10px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg3); color: var(--t4); font-size: 10px; font-weight: 700;
  cursor: pointer; transition: all .15s; text-align: center;
}
.team-chip:hover { border-color: var(--t5); color: var(--t3); }
.team-chip.on { border-color: var(--blue); color: var(--bluel); background: var(--bluebg); }

/* ── Tab Nav ── */
.main-tabs {
  display: flex; gap: 2px; margin-bottom: 16px; background: var(--bg2);
  border: 1px solid var(--bdr); border-radius: 8px; padding: 3px; width: fit-content;
}
.main-tab {
  padding: 7px 16px; border-radius: 6px; font-size: 11px; font-weight: 700;
  color: var(--t5); cursor: pointer; transition: all .15s; border: none; background: none;
}
.main-tab:hover { color: var(--t3); }
.main-tab.on { background: var(--bluebg); color: var(--bluel); }

/* ── Text area ── */
.ta {
  width: 100%; min-height: 120px; padding: 10px; border-radius: 8px;
  border: 1px solid var(--bdr); background: var(--bg); color: var(--t2);
  font-size: 12px; font-family: 'JetBrains Mono', monospace; resize: vertical; outline: none;
}
.ta:focus { border-color: var(--blue); }
.ta::placeholder { color: #283040; }

/* ── Depth Chart Impact Preview ── */
.impact-card {
  background: var(--bg3); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px; margin-bottom: 8px;
}
.impact-team { font-size: 12px; font-weight: 800; color: var(--bluel); margin-bottom: 4px; }
.impact-change { font-size: 11px; color: var(--t3); }
.impact-arrow { color: var(--org); font-weight: 800; }

/* ── Empty State ── */
.empty-state {
  padding: 60px 20px; text-align: center;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .3; }
.empty-title { font-size: 16px; font-weight: 800; color: var(--t3); margin-bottom: 6px; }
.empty-sub { font-size: 12px; color: var(--t5); max-width: 400px; margin: 0 auto; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="hdr">
  <div class="hdr-left" onclick="setState({view:'feed'})">
    <div class="hdr-logo" id="hdrLogo">IW</div>
    <div>
      <div class="hdr-title">Intel Wire <span style="font-weight:400;color:var(--t5)">v1.1</span></div>
      <div class="hdr-sub" id="hdrSub">NFL DEPTH CHART INTELLIGENCE · X FEED MONITOR</div>
    </div>
  </div>
  <div class="hdr-btns">
    <div class="league-sw">
      <button class="lg-btn nfl on" onclick="switchLeague('nfl')">NFL</button>
      <button class="lg-btn ncaa" onclick="switchLeague('ncaa')">NCAA</button>
    </div>
    <div id="liveIndicator" class="live-badge" style="display:none"><div class="live-dot"></div>SCANNING</div>
    <button class="btn-sm" onclick="exportApproved()">📥 Export</button>
    <button class="btn-sm" onclick="importState()">📤 Import</button>
    <button class="btn-save" onclick="saveState()">💾 Save</button>
  </div>
</div>

<!-- ── Main ── -->
<div class="wrap" id="app"></div>

<!-- ── Toast Container ── -->

// ── Helpers ──
function $(sel) { return document.querySelector(sel); }
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'disabled' && v) el.setAttribute('disabled', '');
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function setState(upd) {
  Object.assign(state, upd);
  render();
}

function showToast(msg, dur=3000) {
  const t = h('div', {class: 'toast'}, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), dur);
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

// ── Auto-classify intel type from post text ──
function classifyIntel(text) {
  const lower = text.toLowerCase();
  let bestType = 'unknown';
  let bestScore = 0;
  
  const iTypes = getIntelTypes();
  for (const [type, config] of Object.entries(iTypes)) {
    let score = 0;
    for (const kw of config.keywords) {
      if (lower.includes(kw.toLowerCase())) score++;
    }
    if (score > bestScore) { bestScore = score; bestType = type; }
  }
  return bestType;
}

// ── Extract team mentions from text ──
function extractTeams(text) {
  const found = [];
  const teams = getTeams();
  for (const team of teams) {
    const patterns = [
      team.abbr, team.short, team.name,
      team.abbr.toLowerCase(), team.short.toLowerCase()
    ];
    for (const p of patterns) {
      // Word boundary check
      const regex = new RegExp('\\b' + p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      if (regex.test(text)) {
        if (!found.includes(team.abbr)) found.push(team.abbr);
        break;
      }
    }
  }
  return found;
}

// ── Extract potential player names (capitalized two-word sequences) ──
function extractPlayers(text) {
  const matches = text.match(/(?:^|[\s,;:])([A-Z][a-z]+(?:\s(?:Jr\.|Sr\.|III|II|IV|[A-Z][a-z]+))+)/g);
  if (!matches) return [];
  return [...new Set(matches.map(m => m.trim()))].slice(0, 5);
}

// ══════════════════════════════════════════════════════════
// X SCRAPING ENGINE
// Uses X's advanced search operators + the curated source list
// to fetch only relevant, trusted content.
// ══════════════════════════════════════════════════════════

// X search URL max safe length (~2000 chars in the query param itself)
const MAX_QUERY_LENGTH = 1800;

// Build X search URL for a batch of accounts
function buildSearchUrl(handles, keywords, dateFrom, dateTo) {
  const fromClause = handles.map(h => 'from:' + h).join(' OR ');
  let q = '(' + fromClause + ')';
  if (keywords && keywords.length) {
    // Only add keywords if they fit within URL limits
    const kwClause = ' (' + keywords.join(' OR ') + ')';
    if ((q + kwClause).length < MAX_QUERY_LENGTH - 100) {
      q += kwClause;
    } else {
      // Trim keywords to fit — take as many as we can
      let trimmedKw = [];
      let testQ = q + ' (';
      for (const kw of keywords) {
        const next = testQ + (trimmedKw.length ? ' OR ' : '') + kw + ')';
        if (next.length < MAX_QUERY_LENGTH - 100) {
          trimmedKw.push(kw);
          testQ = q + ' (' + trimmedKw.join(' OR ') + ')';
        } else break;
      }
      if (trimmedKw.length) q += ' (' + trimmedKw.join(' OR ') + ')';
    }
  }
  if (dateFrom) q += ' since:' + dateFrom;
  if (dateTo) q += ' until:' + dateTo;
  q += ' -filter:replies';
  return 'https://x.com/search?q=' + encodeURIComponent(q) + '&src=typed_query&f=live';
}

// Dynamically calculate batch size based on keyword length
function calcBatchSize(keywords) {
  if (!keywords || !keywords.length) return 12;
  const kwLength = keywords.join(' OR ').length + 4; // parens + spaces
  // from:handle averages ~18 chars per handle + " OR " = ~22
  // Budget: MAX_QUERY_LENGTH - kwLength - 50 (for date/filter) = space for handles
  const handleBudget = MAX_QUERY_LENGTH - kwLength - 80;
  const perHandle = 22; // avg "from:SomeHandle OR "
  const size = Math.max(3, Math.min(12, Math.floor(handleBudget / perHandle)));
  return size;
}

// Generate scrape URLs for batches
function generateScrapeUrls(options = {}) {
  const {
    category = 'all',
    team = 'all', 
    keywords = [],
    dateFrom = '',
    dateTo = ''
  } = options;
  
  let sources = getSources();
  
  if (category !== 'all') {
    sources = sources.filter(s => s.cat === category);
  }
  if (team !== 'all') {
    sources = sources.filter(s => s.teams.length === 0 || s.teams.includes(team));
  }
  
  const handles = sources.map(s => s.h);
  const batchSize = calcBatchSize(keywords);
  const urls = [];
  
  for (let i = 0; i < handles.length; i += batchSize) {
    const batch = handles.slice(i, i + batchSize);
    const url = buildSearchUrl(batch, keywords, dateFrom, dateTo);
    
    // Final safety check — if URL is still too long, split further
    if (url.length > 2200) {
      const half = Math.ceil(batch.length / 2);
      urls.push({
        url: buildSearchUrl(batch.slice(0, half), keywords, dateFrom, dateTo),
        handles: batch.slice(0, half),
        batchNum: urls.length + 1,
        totalBatches: -1 // recalculated below
      });
      urls.push({
        url: buildSearchUrl(batch.slice(half), keywords, dateFrom, dateTo),
        handles: batch.slice(half),
        batchNum: urls.length + 1,
        totalBatches: -1
      });
    } else {
      urls.push({
        url: url,
        handles: batch,
        batchNum: urls.length + 1,
        totalBatches: -1
      });
    }
  }
  
  // Fix totalBatches
  urls.forEach(u => u.totalBatches = urls.length);
  
  return urls;
}

  }

// ── Paste from X (parse pasted tweet text) ──
function parsePastedTweets(text) {
  // Split on common tweet separators
  const blocks = text.split(/\n{2,}/).filter(b => b.trim());
  const items = [];
  
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    let author = '';
    let tweetText = '';
    let timestamp = '';
    
    // Try to extract @handle
    const handleMatch = block.match(/@(\w+)/);
    if (handleMatch) author = handleMatch[1];
    
    // The main text is everything that's not metadata
    tweetText = lines.filter(l => {
      const trimmed = l.trim();
      // Skip lines that look like metadata
      if (trimmed.match(/^\d+:\d+\s*(AM|PM)/i)) { timestamp = trimmed; return false; }
      if (trimmed.match(/^\d+\s+(repost|like|reply|view|quote)/i)) return false;
      if (trimmed.match(/^(Show this thread|Translate post)/i)) return false;
      return true;
    }).join(' ').trim();
    
    if (tweetText.length > 10) {
      items.push({
        id: genId(),
        author: author || 'unknown',
        authorName: author || 'Pasted',
        text: tweetText,
        type: classifyIntel(tweetText),
        teams: extractTeams(tweetText),
        players: extractPlayers(tweetText),
        timestamp: timestamp || new Date().toISOString(),
        status: 'pending',
        source: 'paste',
        url: ''
      });
    }
  }
  return items;
}

// ── Approve / Reject / Reclassify ──
function approveItem(id) {
  const items = activeLeague === 'nfl' ? state.feedItems : ncaaFeedItems;
  const approved = activeLeague === 'nfl' ? state.approvedItems : ncaaApprovedItems;
  const rejected = getRejectedIds();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = 'approved';
  if (!approved.find(a => a.id === id)) {
    approved.push({...item});
  }
  rejected.delete(id);
  render();
}

function rejectItem(id) {
  const items = activeLeague === 'nfl' ? state.feedItems : ncaaFeedItems;
  const rejected = getRejectedIds();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = 'rejected';
  rejected.add(id);
  if (activeLeague === 'nfl') state.approvedItems = state.approvedItems.filter(a => a.id !== id);
  else ncaaApprovedItems = ncaaApprovedItems.filter(a => a.id !== id);
  render();
}

function reclassifyItem(id, newType) {
  const items = activeLeague === 'nfl' ? state.feedItems : ncaaFeedItems;
  const approved = activeLeague === 'nfl' ? state.approvedItems : ncaaApprovedItems;
  const item = items.find(i => i.id === id);
  if (item) item.type = newType;
  const app = approved.find(a => a.id === id);
  if (app) app.type = newType;
  setState({modalOpen: null, reclassifyTarget: null});
}

function editTeams(id, teams) {
  const item = state.feedItems.find(i => i.id === id);
  if (item) item.teams = teams;
  const approved = state.approvedItems.find(a => a.id === id);
  if (approved) approved.teams = teams;
  render();
}

const TOP_INSIDERS = ['AdamSchefter','RapSheet','TomPelissero','FieldYates','JosinaAnderson','DMRussini','MikeGarafolo','JayGlazer','Schultz_Report','JeffDarlington','DiannaESPN','CharlesRobinson','JFowlerESPN','DanGrazianoESPN','JennyVrentas'];

async function autoFetchInsiderIntel() {
  if (state._autoFeedLoading) return;
  state._autoFeedLoading = true;
  state._autoFeedError = null;
  render();
  
  try {
    const isNFL = activeLeague === 'nfl';
    const insiderList = getTopInsiders().join(', @');
    const systemPrompt = isNFL
      ? `You are an NFL news aggregator. You must search the web and return structured JSON. After searching, return ONLY a JSON array — no explanations, no markdown, no preamble.`
      : `You are a college football news aggregator. You must search the web and return structured JSON. After searching, return ONLY a JSON array — no explanations, no markdown, no preamble.`;
    
    const userPrompt = isNFL
      ? `Search for the LATEST NFL news from the past 24 hours that impacts team depth charts: injuries, trades, signings, releases, waivers, suspensions, benchings, promotions, practice status updates, roster moves.

IMPORTANT: Only include NFL (professional) news. Do NOT include any NCAA, college football, draft prospect, or college player news. Only current NFL roster players and NFL team transactions.

Focus on news from top NFL insiders: @${insiderList}

Search for: "NFL injury news today", "NFL transactions today", "NFL roster moves today"

Return ONLY a JSON array. Each item: {"author":"TwitterHandle","text":"full news summary","teams":["ABR"],"players":["Full Name"],"type":"injury|transaction|benching|promotion|suspension|retirement","timestamp":"Xh ago"}
Team abbreviations: ARI,ATL,BAL,BUF,CAR,CHI,CIN,CLE,DAL,DEN,DET,GB,HOU,IND,JAX,KC,MIA,MIN,NE,NO,NYG,NYJ,LV,PHI,PIT,LAR,LAC,SF,SEA,TB,TEN,WAS
If no news found, return [].`
      : `Search for the LATEST college football (NCAA/CFB) news from the past 24 hours that impacts team depth charts: injuries, transfer portal entries/commitments, suspensions, dismissals, benchings, QB competitions, NIL deals, coaching changes.

IMPORTANT: Only include COLLEGE FOOTBALL news. Do NOT include any NFL or professional football news.

Focus on news from top CFB insiders: @${insiderList}

Search for: "college football transfer portal today", "CFB injury news", "college football roster moves today", "CFB portal tracker"

Return ONLY a JSON array. Each item: {"author":"TwitterHandle","text":"full news summary","teams":["ABR"],"players":["Full Name"],"type":"injury|portal|transaction|benching|promotion|suspension|nil|coaching","timestamp":"Xh ago"}
Top team abbreviations: ALA,UGA,OSU,MICH,TEX,ORE,PSU,USC,FSU,MIAF,CLEM,LSU,TENN,OU,TAMU,UNC,COLO,IOWA,NEB,SC
If no news found, return [].`;

    // First call — model will likely use web_search tool
    let messages = [{ role: "user", content: userPrompt }];
    let finalText = '';
    let rounds = 0;
    const maxRounds = 5;
    
    while (rounds < maxRounds) {
      rounds++;
      console.log('[Intel Wire] API call round ' + rounds);
      
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: systemPrompt,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: messages
        })
      });
      
      const data = await response.json();
      console.log('[Intel Wire] Response stop_reason:', data.stop_reason, 'content blocks:', data.content?.length);
      
      if (!data.content) {
        console.error('[Intel Wire] No content in response:', data);
        break;
      }
      
      // Collect all text from this response
      for (const block of data.content) {
        if (block.type === 'text') {
          finalText += block.text;
          console.log('[Intel Wire] Got text block, length:', block.text.length);
        }
      }
      
      // If stop_reason is "end_turn" or we got text with JSON, we're done
      if (data.stop_reason === 'end_turn') {
        console.log('[Intel Wire] End turn reached');
        break;
      }
      
      // If stop_reason is "tool_use", the model wants to use a tool
      // The API handles web_search server-side, so we just need to 
      // pass the response back as assistant message and continue
      if (data.stop_reason === 'tool_use') {
        // Add the assistant's response (with tool_use blocks) to messages
        messages.push({ role: "assistant", content: data.content });
        
        // For server-side tools like web_search, we need to send back 
        // tool results — but the API handles this automatically
        // Just add a user message to continue
        messages.push({ role: "user", content: "Please continue and provide the JSON array of results." });
        continue;
      }
      
      // Any other stop reason, break
      break;
    }
    
    console.log('[Intel Wire] Final text length:', finalText.length);
    console.log('[Intel Wire] Final text preview:', finalText.substring(0, 200));
    
    // Parse JSON from collected text
    let items = [];
    const jsonMatch = finalText.match(/\[[\s\S]*\]/);
    if (jsonMatch) {
      try {
        items = JSON.parse(jsonMatch[0].replace(/```json|```/g, '').trim());
        console.log('[Intel Wire] Parsed', items.length, 'items');
      } catch(e) { 
        console.warn('[Intel Wire] JSON parse failed:', e);
        console.log('[Intel Wire] Attempted to parse:', jsonMatch[0].substring(0, 300));
      }
    } else {
      console.warn('[Intel Wire] No JSON array found in response');
    }
    
    state._autoFeedItems = items.filter(item => item && item.text && item.text.length > 10).map(item => ({
      id: genId(),
      author: item.author || 'unknown',
      text: item.text,
      teams: item.teams || extractTeams(item.text),
      players: item.players || extractPlayers(item.text),
      type: item.type || classifyIntel(item.text),
      timestamp: item.timestamp || 'today',
      status: 'pending',
      source: 'auto'
    }));
    
    // Store per-league
    if (isNFL) nflAutoFeed = state._autoFeedItems;
    else ncaaAutoFeed = state._autoFeedItems;
    
    state._autoFeedLoading = false;
    state._autoTeamFilter = 'all';
    render();
    
    if (state._autoFeedItems.length > 0) {
      showToast('✓ Found ' + state._autoFeedItems.length + ' intel items');
    } else {
      showToast('Search completed but no depth-chart-impacting news found');
    }
    
  } catch(err) {
    console.error('[Intel Wire] Auto-fetch failed:', err);
    state._autoFeedLoading = false;
    
    const isLocalFile = window.location.protocol === 'file:';
    if (isLocalFile || (err.message && err.message.includes('Failed to fetch'))) {
      state._autoFeedError = 'API unavailable from local file. Use the X search links below, or open this as an artifact in Claude.ai for auto-scanning.';
    } else {
      state._autoFeedError = err.message || 'Unknown error';
    }
    render();
  }
}

      h('div', {style:{fontSize:'11px',color:'var(--t5)',marginBottom:'10px'}}, 'Click Scan Now to fetch the latest from top ' + (activeLeague === 'nfl' ? 'NFL' : 'CFB') + ' insiders'),
      h('button', {class: 'btn-pri', style:{fontSize:'12px',padding:'10px 20px'}, onClick: autoFetchInsiderIntel}, '🔍 Scan Now')
    ));
  } else {
    // Team filter bar
    const filterRow = h('div', {style:{padding:'8px 12px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:'4px',flexWrap:'wrap',background:'var(--bg4)'}});
    filterRow.appendChild(h('button', {class:'feed-filter' + (state._autoTeamFilter === 'all' ? ' on':''), onClick:()=>setState({_autoTeamFilter:'all'})}, 'All'));
    const seenTeams = new Set();
    state._autoFeedItems.forEach(item => (item.teams||[]).forEach(t => seenTeams.add(t)));
    [...seenTeams].sort().forEach(t => {
      filterRow.appendChild(h('button', {class:'feed-filter' + (state._autoTeamFilter === t ? ' on':''), onClick:()=>setState({_autoTeamFilter:t})}, t));
    });
    feedBody.appendChild(filterRow);
    
    let displayItems = state._autoFeedItems;
    if (state._autoTeamFilter && state._autoTeamFilter !== 'all') {
      displayItems = displayItems.filter(item => (item.teams||[]).includes(state._autoTeamFilter));
    }
    
    if (displayItems.length === 0) {
      feedBody.appendChild(h('div', {style:{padding:'20px',textAlign:'center',fontSize:'12px',color:'var(--t5)'}}, 'No items for this team filter'));
    }
    
    displayItems.forEach(item => {
      const typeCls = getIntelTypes()[item.type] ? getIntelTypes()[item.type].cls : 'type-unknown';
      const typeLabel = getIntelTypes()[item.type] ? getIntelTypes()[item.type].label : item.type || 'News';
      
      const el = h('div', {class: 'feed-item pending', style:{padding:'12px 16px'}});
      const meta = h('div', {class: 'feed-meta'});
      meta.appendChild(h('span', {class: 'feed-author'}, '@' + (item.author || 'unknown')));
      meta.appendChild(h('span', {class: 'feed-type ' + typeCls}, typeLabel));
      if (item.timestamp) meta.appendChild(h('span', {class: 'feed-time'}, item.timestamp));
      el.appendChild(meta);
      
      const textEl = h('div', {class: 'feed-text'});
      textEl.textContent = item.text || '';
      el.appendChild(textEl);
      
      if ((item.teams && item.teams.length) || (item.players && item.players.length)) {
        const tags = h('div', {class: 'feed-tags'});
        (item.teams || []).forEach(t => tags.appendChild(h('span', {class: 'feed-tag team'}, t)));
        (item.players || []).forEach(p => tags.appendChild(h('span', {class: 'feed-tag player'}, p)));
        el.appendChild(tags);
      }
      feedBody.appendChild(el);
    });
  }
  
  feedPanel.appendChild(feedBody);
  sec.appendChild(feedPanel);
  
  // ════════════════════════════════════════════
  // SECONDARY: Collapsible manual tools
  // ════════════════════════════════════════════
  const toolsToggle = h('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',cursor:'pointer'}, onClick: () => setState({_showTools: !state._showTools})});
  toolsToggle.appendChild(h('span', {style:{fontSize:'12px',fontWeight:800,color:'var(--t3)'}}, (state._showTools ? '▾' : '▸') + ' More Search Tools'));
  toolsToggle.appendChild(h('div', {style:{flex:1,height:'1px',background:'var(--bdr)'}}));
  sec.appendChild(toolsToggle);
  
  if (state._showTools) {
    function getSince(days) { return new Date(Date.now() - days * 86400000).toISOString().slice(0,10); }
    function quickUrl(handles, keywords, sinceDays) {
      const fromClause = handles.map(x => 'from:' + x).join(' OR ');
      let q = '(' + fromClause + ')';
      if (keywords.length) q += ' (' + keywords.join(' OR ') + ')';
      q += ' since:' + getSince(sinceDays || 1) + ' -filter:replies';
      return 'https://x.com/search?q=' + encodeURIComponent(q) + '&src=typed_query&f=live';
    }
    const topInsiders = getTopInsiders();
    
    const ip = h('div', {class: 'panel', style:{marginBottom:'12px'}});
    ip.appendChild(h('div', {class: 'panel-hdr'}, h('span', {class: 'panel-title'}, '🔗 Open in X — Top ' + (activeLeague === 'nfl' ? 'NFL' : 'CFB') + ' Insiders')));
    const ib = h('div', {class: 'panel-body'});
    ib.appendChild(h('p', {style:{fontSize:'10px',color:'var(--t5)',marginBottom:'8px'}}, activeLeague === 'nfl' ? 'Schefter, Rapoport, Pelissero, Garafolo + 11 more.' : 'Thamel, McMurphy, Feldman, 247, Rivals + more.'));
    const ir = h('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap'}});
    if (activeLeague === 'nfl') {
      ir.appendChild(h('a', {href: quickUrl(topInsiders, ['injury','IR','questionable','doubtful','ruled out','MRI','surgery'], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '🏥 Injuries'));
      ir.appendChild(h('a', {href: quickUrl(topInsiders, ['trade','traded','signed','released','waived','claimed'], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '📋 Transactions'));
      ir.appendChild(h('a', {href: quickUrl(topInsiders, ['starter','benched','depth chart','will start'], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '📊 Depth Chart'));
    } else {
      ir.appendChild(h('a', {href: quickUrl(topInsiders, ['injury','questionable','out','surgery','MRI','ACL'], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '🏥 Injuries'));
      ir.appendChild(h('a', {href: quickUrl(topInsiders, ['portal','transfer','committed','decommit','flipped','entered'], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '🔄 Portal'));
      ir.appendChild(h('a', {href: quickUrl(topInsiders, ['starter','benched','depth chart','QB1','competition'], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '📊 Depth Chart'));
    }
    ir.appendChild(h('a', {href: quickUrl(topInsiders, [], 1), target:'_blank', class:'btn-sm', style:{textDecoration:'none',padding:'8px 14px'}}, '📨 All Posts'));
    ib.appendChild(ir); ip.appendChild(ib); sec.appendChild(ip);
    
    // Open in X: By Team (team reporters only — small handful per team, always fits)
    const tp = h('div', {class: 'panel', style:{marginBottom:'12px'}});
    tp.appendChild(h('div', {class: 'panel-hdr'}, h('span', {class: 'panel-title'}, '🔗 Open in X — By Team')));
    const tb = h('div', {class: 'panel-body'});
    tb.appendChild(h('p', {style:{fontSize:'10px',color:'var(--t5)',marginBottom:'8px'}}, 'Searches beat reporters for a specific ' + (activeLeague === 'nfl' ? 'team' : 'school') + '. One tab per search.'));
    const tr2 = h('div', {style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'8px'}});
    const ts = h('select', {class: 'config-input', id: 'quickTeamSelect', style:{flex:'1'}});
    getTeams().forEach(t => ts.appendChild(h('option', {value: t.abbr}, t.abbr + ' — ' + (t.name || t.short))));
    tr2.appendChild(ts);
    const ls = h('select', {class: 'config-input', id: 'quickLookback', style:{width:'110px'}});
    ['1','2','3','7'].forEach(d => ls.appendChild(h('option', {value: d}, d + (d==='1'?' day':' days'))));
    tr2.appendChild(ls); tb.appendChild(tr2);
    function openTeamSearch(kw) {
      const a = document.getElementById('quickTeamSelect').value;
      const d = parseInt(document.getElementById('quickLookback').value) || 1;
      // Only team-specific reporters — NOT insiders (keeps URL short)
      const th = getSources().filter(s => s.teams.includes(a)).map(s => s.h);
      if (th.length === 0) { showToast('No beat reporters found for ' + a); return; }
      window.open(quickUrl(th, kw, d), '_blank');
    }
    const tbr = h('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap'}});
    tbr.appendChild(h('button', {class:'btn-sm', style:{padding:'8px 14px',fontSize:'11px'}, onClick:()=>openTeamSearch(['injury','IR','questionable','doubtful','ruled out'])}, '🏥 Injuries'));
    tbr.appendChild(h('button', {class:'btn-sm', style:{padding:'8px 14px',fontSize:'11px'}, onClick:()=>openTeamSearch(['trade','signed','released','waived','claimed'])}, '📋 Transactions'));
    tbr.appendChild(h('button', {class:'btn-sm', style:{padding:'8px 14px',fontSize:'11px'}, onClick:()=>openTeamSearch([])}, '📨 All Posts'));
    tb.appendChild(tbr); tp.appendChild(tb); sec.appendChild(tp);
    
    // Paste Tweets
    const pp = h('div', {class: 'panel', style:{marginBottom:'12px'}});
    pp.appendChild(h('div', {class: 'panel-hdr'}, h('span', {class: 'panel-title'}, '📋 Paste Tweets')));
    const pb = h('div', {class: 'panel-body'});
    const ta = h('textarea', {class: 'ta', id: 'pasteTweets', placeholder: 'Paste tweets here...'});
    pb.appendChild(ta);
    pb.appendChild(h('div', {style:{marginTop:'8px',display:'flex',gap:'8px'}},
      h('button', {class:'btn-pri', style:{fontSize:'11px',padding:'8px 16px'}, onClick:() => {
        const text = document.getElementById('pasteTweets').value;
        if (!text.trim()) { showToast('Nothing to parse'); return; }
        const items = parsePastedTweets(text);
        if (!items.length) { showToast('Could not parse'); return; }
        if (activeLeague === 'nfl') state.feedItems.unshift(...items);
        else ncaaFeedItems.unshift(...items);
        document.getElementById('pasteTweets').value = '';
        render();
        showToast('✓ Parsed ' + items.length + ' tweets');
      }}, '🧠 Parse & Import'),
      h('button', {class:'btn-sm', style:{fontSize:'11px',padding:'8px 16px'}, onClick:()=>{document.getElementById('pasteTweets').value='';}}, 'Clear')
    ));
    pp.appendChild(pb); sec.appendChild(pp);
  }
  
  app.appendChild(sec);
}


function renderSources(app) {
  const sec = h('div', {class: 'anim'});
  sec.appendChild(h('h2', {class: 'h2'}, '👥 Curated Source List'));
  sec.appendChild(h('p', {class: 'sub'}, 'These are the ' + getSources().length + ' X accounts' + (activeLeague === 'nfl' ? ' from @OnChainTDs following list' : ' from CFB beat reporters list') + '. Categorized by type and team.'));
  
  // Category stats
  const catCounts = {};
  getSources().forEach(s => { catCounts[s.cat] = (catCounts[s.cat] || 0) + 1; });
  
  const statsRow = h('div', {style:{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}});
  statsRow.appendChild(h('button', {class: 'feed-filter' + (state.sourceFilter === 'all' ? ' on' : ''), onClick: () => setState({sourceFilter:'all'})}, 
    'All (' + getSources().length + ')'));
  for (const [cat, config] of Object.entries(CATEGORIES)) {
    statsRow.appendChild(h('button', {
      class: 'feed-filter' + (state.sourceFilter === cat ? ' on' : ''),
      onClick: () => setState({sourceFilter: cat})
    }, config.label + ' (' + (catCounts[cat] || 0) + ')'));
  }
  sec.appendChild(statsRow);
  
  // Search
  const searchRow = h('div', {style:{marginBottom:'12px'}});
  const searchInp = h('input', {class: 'config-input', placeholder: 'Search handles or team...', value: state.sourceSearch || ''});
  searchInp.addEventListener('input', e => { state.sourceSearch = e.target.value; render(); });
  searchRow.appendChild(searchInp);
  sec.appendChild(searchRow);
  
  // Source grid
  let filtered = getSources();
  if (state.sourceFilter !== 'all') filtered = filtered.filter(s => s.cat === state.sourceFilter);
  if (state.sourceSearch) {
    const q = state.sourceSearch.toLowerCase();
    filtered = filtered.filter(s => s.h.toLowerCase().includes(q) || (s.teams || []).join(' ').toLowerCase().includes(q));
  }
  
  const grid = h('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))',gap:'6px'}});
  filtered.forEach((srcItem, idx) => {
    const catInfo = CATEGORIES[srcItem.cat] || CATEGORIES.other;
    const card = h('div', {class: 'src-item', style:{borderBottom:'none',border:'1px solid var(--bdr)',borderRadius:'6px'}});
    
    card.appendChild(h('div', {class: 'src-avatar'}, srcItem.h.substring(0, 2).toUpperCase()));
    const info = h('div', {class: 'src-info'});
    info.appendChild(h('div', {class: 'src-handle'}, '@' + srcItem.h));
    const tagRow = h('div', {style:{display:'flex',gap:'4px',marginTop:'2px',alignItems:'center'}});
    tagRow.appendChild(h('span', {class: 'src-cat ' + catInfo.cls}, catInfo.label));
    if (srcItem.teams && srcItem.teams.length) {
      srcItem.teams.forEach(t => tagRow.appendChild(h('span', {style:{fontSize:'9px',color:'var(--t5)'}}, t)));
    }
    info.appendChild(tagRow);
    card.appendChild(info);
    
    // Quick edit dropdown
    const editBtn = h('select', {class: 'config-input', style:{width:'90px',fontSize:'9px',padding:'2px 4px'}, onChange: e => {
      const origIdx = getSources().findIndex(s => s.h === srcItem.h);
      if (origIdx !== -1) getSources()[origIdx].cat = e.target.value;
      render();
    }});
    for (const [k, v] of Object.entries(CATEGORIES)) {
      const opt = h('option', {value: k}, v.label);
      if (k === srcItem.cat) opt.selected = true;
      editBtn.appendChild(opt);
    }
    card.appendChild(editBtn);
    
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  
  // Add new source
  sec.appendChild(h('div', {style:{marginTop:'16px',padding:'12px',background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:'8px'}},
    h('div', {style:{fontSize:'11px',fontWeight:700,color:'var(--t3)',marginBottom:'8px'}}, '+ Add New Source'),
    h('div', {style:{display:'flex',gap:'8px'}},
      h('input', {class: 'config-input', id: 'newSourceHandle', placeholder: '@handle'}),
      h('select', {class: 'config-input', id: 'newSourceCat', style:{width:'140px'}},
        ...Object.entries(CATEGORIES).map(([k,v]) => h('option', {value: k}, v.label))
      ),
      h('input', {class: 'config-input', id: 'newSourceTeam', placeholder: 'Team (e.g. KC)', style:{width:'80px'}}),
      h('button', {class: 'btn-save', onClick: () => {
        const handle = document.getElementById('newSourceHandle').value.replace('@','').trim();
        const cat = document.getElementById('newSourceCat').value;
        const team = document.getElementById('newSourceTeam').value.trim().toUpperCase();
        if (!handle) { showToast('Enter a handle'); return; }
        if (getSources().find(s => s.h.toLowerCase() === handle.toLowerCase())) { showToast('Already exists'); return; }
        getSources().push({h: handle, cat, teams: team ? [team] : []});
        render();
        showToast('✓ Added @' + handle);
      }}, '+ Add')
    )
  ));
  
  app.appendChild(sec);
}

function renderSettings(app) {
  const sec = h('div', {class: 'anim'});
  sec.appendChild(h('h2', {class: 'h2'}, '⚙️ Settings'));
  sec.appendChild(h('p', {class: 'sub'}, 'Configure Intel Wire behavior and manage data.'));
  
  // Data management
  const dataPanel = h('div', {class: 'panel', style:{marginBottom:'16px'}});
  dataPanel.appendChild(h('div', {class: 'panel-hdr'}, h('span', {class: 'panel-title'}, 'Data Management')));
  const dataBody = h('div', {class: 'panel-body'});
  
  dataBody.appendChild(h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
    h('button', {class: 'btn-pri', style:{fontSize:'11px',padding:'10px'}, onClick: saveState}, '💾 Save to LocalStorage'),
    h('button', {class: 'btn-sm', style:{fontSize:'11px',padding:'10px'}, onClick: importState}, '📤 Import JSON'),
    h('button', {class: 'btn-sm', style:{fontSize:'11px',padding:'10px'}, onClick: () => doExport('json')}, '📥 Export JSON'),
    h('button', {class: 'btn-sm', style:{fontSize:'11px',padding:'10px'}, onClick: () => doExport('csv')}, '📥 Export CSV')
  ));
  
  dataBody.appendChild(h('div', {style:{marginTop:'12px'}},
    h('button', {class: 'btn-red', style:{fontSize:'11px',padding:'8px 16px'}, onClick: () => {
      if (confirm('Clear ALL data? This cannot be undone.')) {
        state.feedItems = [];
        state.approvedItems = [];
        state.rejectedIds = new Set();
        state.scrapeHistory = [];
        localStorage.removeItem('intel_wire_v1_1');
        render();
        showToast('✓ All data cleared');
      }
    }}, '🗑️ Clear All Data')
  ));
  
  dataPanel.appendChild(dataBody);
  sec.appendChild(dataPanel);
  
  // Integration info
  const intPanel = h('div', {class: 'panel', style:{marginBottom:'16px'}});
  intPanel.appendChild(h('div', {class: 'panel-hdr'}, h('span', {class: 'panel-title'}, 'Depth Chart Auditor Integration')));
  const intBody = h('div', {class: 'panel-body'});
  intBody.appendChild(h('p', {style:{fontSize:'12px',color:'var(--t3)',marginBottom:'8px'}}, 
    'Intel Wire exports are formatted for direct import into Depth Chart Auditor v2.0. The JSON export includes franchise_id mappings that match the PFF depth chart CSV format.'));
  intBody.appendChild(h('div', {style:{padding:'10px',background:'var(--bg3)',borderRadius:'6px',border:'1px solid var(--bdr)'}},
    h('pre', {style:{fontSize:'10px',color:'var(--t4)',fontFamily:'JetBrains Mono',whiteSpace:'pre-wrap'}}, 
      '// Export format:\n{\n  "depthChartImpact": {\n    "franchise_ids": [1],      // matches depth_chart CSV\n    "impactType": "injury",    // injury|transaction|benching|...\n    "playerNames": ["Kyler Murray"]\n  }\n}')
  ));
  intPanel.appendChild(intBody);
  sec.appendChild(intPanel);
  
  // Source stats
  const srcPanel = h('div', {class: 'panel'});
  srcPanel.appendChild(h('div', {class: 'panel-hdr'}, h('span', {class: 'panel-title'}, 'Source Coverage')));
  const srcBody = h('div', {class: 'panel-body'});
  
  const teamCoverage = {};
  getTeams().forEach(t => { teamCoverage[t.abbr] = 0; });
  getSources().forEach(s => { (s.teams || []).forEach(t => { if (teamCoverage[t] !== undefined) teamCoverage[t]++; }); });
  
  const coverageGrid = h('div', {class: 'team-grid'});
  getTeams().forEach(t => {
    const count = teamCoverage[t.abbr] || 0;
    coverageGrid.appendChild(h('div', {
      class: 'team-chip',
      style: {color: count > 0 ? 'var(--grnl)' : 'var(--t5)', borderColor: count > 0 ? '#047857' : 'var(--bdr)'}
    }, t.abbr + ' · ' + count + ' sources'));
  });
  srcBody.appendChild(coverageGrid);
  srcPanel.appendChild(srcBody);
  sec.appendChild(srcPanel);
  
  app.appendChild(sec);
}

function renderModal() {
  // Remove existing
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  
  const overlay = h('div', {class: 'modal-overlay', onClick: e => { if (e.target === overlay) setState({modalOpen: null}); }});
  const modal = h('div', {class: 'modal'});
  
  if (state.modalOpen === 'reclassify') {
    modal.appendChild(h('div', {class: 'modal-hdr'},
      h('span', {style:{fontWeight:800,color:'var(--t1)'}}, 'Reclassify Intel'),
      h('button', {class: 'modal-close', onClick: () => setState({modalOpen:null})}, '✕')
    ));
    const body = h('div', {class: 'modal-body'});
    body.appendChild(h('p', {style:{fontSize:'12px',color:'var(--t3)',marginBottom:'12px'}}, 'Select the correct intel type:'));
    
    for (const [type, config] of Object.entries(getIntelTypes())) {
      body.appendChild(h('button', {
        class: 'btn-sm',
        style: {display:'block',width:'100%',marginBottom:'6px',padding:'10px',textAlign:'left'},
        onClick: () => reclassifyItem(state.reclassifyTarget, type)
      }, config.label + ' — ' + config.keywords.slice(0, 5).join(', ') + '...'));
    }
    modal.appendChild(body);
  }
  
  else if (state.modalOpen === 'manual') {
    modal.appendChild(h('div', {class: 'modal-hdr'},
      h('span', {style:{fontWeight:800,color:'var(--t1)'}}, 'Add Manual Entry'),
      h('button', {class: 'modal-close', onClick: () => setState({modalOpen:null})}, '✕')
    ));
    const body = h('div', {class: 'modal-body'});
    body.appendChild(h('p', {style:{fontSize:'12px',color:'var(--t3)',marginBottom:'8px'}}, 'Enter intel text. Teams, players, and type will be auto-detected.'));
    const ta = h('textarea', {class: 'ta', placeholder: 'e.g. Patrick Mahomes (knee) is questionable for Sunday\'s game against the Raiders.'});
    ta.value = state.manualEntryText;
    ta.addEventListener('input', e => state.manualEntryText = e.target.value);
    body.appendChild(ta);
    body.appendChild(h('button', {class: 'btn-grn', style:{marginTop:'8px'}, onClick: () => { addManualEntry(); setState({modalOpen:null}); }}, '+ Add Entry'));
    modal.appendChild(body);
  }
  
  else if (state.modalOpen === 'export') {
    modal.appendChild(h('div', {class: 'modal-hdr'},
      h('span', {style:{fontWeight:800,color:'var(--t1)'}}, 'Export Intel'),
      h('button', {class: 'modal-close', onClick: () => setState({modalOpen:null})}, '✕')
    ));
    const body = h('div', {class: 'modal-body'});
    const approved = getApprovedItems().length;
    const total = getFeedItems().filter(i => !getRejectedIds().has(i.id)).length;
    body.appendChild(h('p', {style:{fontSize:'12px',color:'var(--t3)',marginBottom:'12px'}},
      approved > 0 ? 'Exporting ' + approved + ' approved items.' : 'No approved items — exporting all ' + total + ' non-rejected items.'));
    
    body.appendChild(h('div', {style:{display:'flex',gap:'8px'}},
      h('button', {class: 'btn-pri', onClick: () => doExport('json')}, '📥 JSON (for Auditor)'),
      h('button', {class: 'btn-sm', style:{padding:'10px 20px'}, onClick: () => doExport('csv')}, '📥 CSV')
    ));
    modal.appendChild(body);
  }
  
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

}

// Auto-scan on load (only if we don't already have items)
if (!state._autoFeedItems || state._autoFeedItems.length === 0) {
  setTimeout(autoFetchInsiderIntel, 500);
}

// ── PWA: Register service worker for offline caching ──
if ('serviceWorker' in navigator) {
  // Inline service worker via blob URL
  const swCode = `
    const CACHE = 'intel-wire-v1.1';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          if (resp.ok && e.request.method === 'GET') {
            const clone = resp.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return resp;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// ── iOS standalone mode: prevent bounce scroll ──
if (window.navigator.standalone) {
  document.body.style.overscrollBehavior = 'none';
}
